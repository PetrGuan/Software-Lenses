name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  parity-check:
    name: Parity check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check canonical-wrapper-README parity
        shell: bash
        run: bash scripts/check-parity.sh

  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check markdown internal links
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/mlc_config.json <<'JSON'
          {
            "ignorePatterns": [
              { "pattern": "^https?://" },
              { "pattern": "^mailto:" }
            ],
            "replacementPatterns": [
              {
                "pattern": "^/",
                "replacement": "./"
              }
            ]
          }
          JSON

          find . -type f -name "*.md" -not -path "./.git/*" -print0 | \
            xargs -0 -n1 markdown-link-check -q -c /tmp/mlc_config.json
